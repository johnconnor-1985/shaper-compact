
[main]
language = en
theme = velvet-darker
font_size = small
print_sort_dir = name_desc
confirm_estop = True
job_complete_timeout: 0
job_error_timeout: 0
show_cursor: False
default_printer: Shaper Compact
use_default_menu: True


[printer Shaper Compact]
z_babystep_values: 0.1, 0.1
move_speed_xy: 200
move_speed_z: 10
titlebar_items: extruder, extruder1, extruder2
titlebar_name_type: full
extrude_distances: 5, 50, 500, 5000
extrude_speeds: 5, 50, 100, 200


[preheat PLA]
gcode: 
  _EXTRUDER_SET_UP S=200
  _EXTRUDER_SET_MID S=200
  _EXTRUDER_SET_DOWN S=200
  SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=extruder DISTANCE=456


[preheat PETG]
gcode: 
  _EXTRUDER_SET_UP S=220
  _EXTRUDER_SET_MID S=240
  _EXTRUDER_SET_DOWN S=240
  SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=extruder DISTANCE=624


[preheat cooldown]
gcode:
  _EXTRUDER_SET_UP S=0
  _EXTRUDER_SET_MID S=0
  _EXTRUDER_SET_DOWN S=0


[menu __main more mixer]
name: Set default mix
icon: filament
method: printer.gcode.script
params: {"script":"_EXTRUDER_MIXING_MULTIPLIER"}


[menu __main more servoprobe]
name: Servo probe
icon: arrow-up


[menu __main more servoprobe servoprobeup]
name: MOVE UP
icon: arrow-up
method: printer.gcode.script
params: {"script":"_PROBE_UP"}


[menu __main more servoprobe servoprobedown]
name: MOVE DOWN
icon: arrow-down
method: printer.gcode.script
params: {"script":"_PROBE_DOWN"}


[menu __main more forcedown]
name: Force Z down
icon: warning
confirm: 'this command will move the Z axis down by 5mm, are you sure? may cause damage to the printer if not used properly'
method: printer.gcode.script
params: {"script":"FORCE_MOVE STEPPER=stepper_z DISTANCE=-5 VELOCITY=1"}

